<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>WallForge Pro | Stealth Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.1); }
        .tool-btn { @apply w-full p-4 rounded-xl flex items-center gap-3 transition-all hover:bg-purple-600/20 text-sm font-semibold text-gray-400 hover:text-white mb-1; }
        input[type="range"] { @apply w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-purple-500; }
        #canvas-wrap { border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <aside class="w-64 glass flex flex-col p-6 z-20">
        <h1 class="text-xl font-black mb-8 text-white">WALLFORGE</h1>
        
        <div class="flex-1 space-y-4">
            <button onclick="addText()" class="tool-btn"><i class="fa-solid fa-font"></i> Text</button>
            <button onclick="flipImage()" class="tool-btn"><i class="fa-solid fa-arrows-left-right"></i> Spiegeln</button>
            <div class="pt-4 border-t border-white/10">
                <label class="text-[10px] text-gray-500 font-bold block mb-2">HELLIGKEIT</label>
                <input type="range" min="-1" max="1" step="0.1" value="0" oninput="applyFilter('brightness', this.value)">
                <label class="text-[10px] text-gray-500 font-bold block mt-4 mb-2">KONTRAST</label>
                <input type="range" min="-1" max="1" step="0.1" value="0" oninput="applyFilter('contrast', this.value)">
            </div>
            <button onclick="localStorage.removeItem('hf_token'); location.reload();" class="text-[9px] text-red-500 underline mt-10">Token zurücksetzen</button>
        </div>

        <button onclick="downloadImage()" class="w-full bg-purple-600 py-4 rounded-xl font-bold mt-4 hover:bg-purple-500">4K EXPORT</button>
    </aside>

    <main class="flex-1 p-8 flex flex-col items-center">
        <div class="w-full max-w-3xl flex gap-3 mb-8 bg-white/5 p-2 rounded-2xl border border-white/10">
            <input id="prompt" type="text" placeholder="Dein Design-Wunsch..." class="flex-1 bg-transparent px-4 outline-none text-white">
            <button onclick="generate()" id="genBtn" class="bg-white text-black px-8 py-3 rounded-xl font-bold">CREATE</button>
        </div>
        <div id="loader" class="hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 text-purple-500 text-center">
            <div class="w-12 h-12 border-4 border-t-transparent border-purple-500 rounded-full animate-spin mx-auto mb-2"></div>
            <p class="font-bold">GENERIERE...</p>
        </div>
        <div id="canvas-wrap"><canvas id="c"></canvas></div>
    </main>

    <script>
        const canvas = new fabric.Canvas('c');
        
        // DER TRICK: Wir speichern den Token nur in deinem Browser, nicht im Code!
        function getToken() {
            let token = localStorage.getItem('hf_token');
            if (!token) {
                token = prompt("Hugging Face macht den Code aus, weil der Token öffentlich war. Bitte füge hier deinen NEUEN Token ein. Er wird nur lokal in deinem Browser gespeichert:");
                if (token) localStorage.setItem('hf_token', token);
            }
            return token;
        }

        async function generate() {
            const token = getToken();
            if(!token) return;
            
            document.getElementById('loader').classList.remove('hidden');
            try {
                const response = await fetch("https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: document.getElementById('prompt').value })
                });
                const blob = await response.blob();
                const reader = new FileReader();
                reader.onloadend = () => {
                    fabric.Image.fromURL(reader.result, (img) => {
                        img.scaleToWidth(canvas.width);
                        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                        document.getElementById('loader').classList.add('hidden');
                    });
                };
                reader.readAsDataURL(blob);
            } catch (e) { 
                alert("Fehler. Token evtl. abgelaufen?"); 
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function addText() { canvas.add(new fabric.IText('TEXT', { left: 50, top: 50, fill: '#fff' })); }
        function flipImage() { if(canvas.backgroundImage) { canvas.backgroundImage.set('flipX', !canvas.backgroundImage.flipX); canvas.renderAll(); } }
        function applyFilter(t, v) {
            const bg = canvas.backgroundImage;
            if(!bg) return;
            const f = t === 'brightness' ? new fabric.Image.filters.Brightness({ brightness: parseFloat(v) }) : new fabric.Image.filters.Contrast({ contrast: parseFloat(v) });
            const i = bg.filters.findIndex(x => x.type.toLowerCase() === t);
            if(i > -1) bg.filters[i] = f; else bg.filters.push(f);
            bg.applyFilters(); canvas.renderAll();
        }
        function downloadImage() { const a = document.createElement('a'); a.download = 'wall.png'; a.href = canvas.toDataURL({multiplier:3}); a.click(); }

        function init() {
            const w = window.innerWidth - 350;
            canvas.setWidth(w); canvas.setHeight(w * 0.56);
            canvas.backgroundColor = '#0b0f1a'; canvas.renderAll();
        }
        window.onresize = init; init();
    </script>
</body>
</html>
