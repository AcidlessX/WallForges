<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WallForge Pro | AI Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .glass-sidebar { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.1); }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tool-btn { @apply w-full p-4 rounded-xl flex items-center gap-3 transition-all hover:bg-purple-600/20 text-sm font-semibold text-gray-300 hover:text-white mb-2; }
        .control-label { @apply text-[10px] uppercase tracking-widest text-gray-500 font-bold mb-2 block; }
        input[type="range"] { @apply w-full h-1.5 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-purple-500; }
        #canvas-wrap { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <aside class="w-72 glass-sidebar flex flex-col p-6 z-20">
        <div class="mb-10 px-2">
            <h1 class="text-xl font-black tracking-tighter text-white">WALLFORGE <span class="text-purple-500">PRO</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Creative Suite v3.0</p>
        </div>

        <div class="flex-1 overflow-y-auto">
            <h3 class="control-label px-2">Ebenen & Objekte</h3>
            <button onclick="addText()" class="tool-btn"><i class="fa-solid fa-font text-purple-400"></i> Text hinzufügen</button>
            <button onclick="flipImage()" class="tool-btn"><i class="fa-solid fa-arrows-left-right text-blue-400"></i> Bild spiegeln</button>
            
            <div class="my-6 border-t border-white/5"></div>

            <h3 class="control-label px-2">Bild-Anpassung</h3>
            <div class="px-2 space-y-6 mt-4">
                <div>
                    <label class="control-label">Helligkeit</label>
                    <input type="range" min="-1" max="1" step="0.1" value="0" oninput="updateFilter('brightness', this.value)">
                </div>
                <div>
                    <label class="control-label">Kontrast</label>
                    <input type="range" min="-1" max="1" step="0.1" value="0" oninput="updateFilter('contrast', this.value)">
                </div>
                <div>
                    <label class="control-label">Sättigung</label>
                    <input type="range" min="-1" max="1" step="0.1" value="0" oninput="updateFilter('saturation', this.value)">
                </div>
            </div>
        </div>

        <button onclick="downloadImage()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-purple-900/20 transition-all active:scale-95">
            <i class="fa-solid fa-download"></i> 4K EXPORT
        </button>
    </aside>

    <main class="flex-1 flex flex-col p-8 relative">
        <div class="max-w-4xl w-full mx-auto glass-card p-2 rounded-[2rem] flex gap-3 mb-10 items-center border-purple-500/20">
            <input id="userPrompt" type="text" placeholder="Beschreibe dein Meisterwerk (z.B. Cyberpunk Samurai, 8k)..." 
                   class="flex-1 bg-transparent border-none py-4 px-8 outline-none text-white text-lg">
            <button onclick="generateAI()" id="genBtn" class="bg-white text-black px-10 py-4 rounded-[1.5rem] font-black hover:bg-purple-400 transition-all flex items-center gap-2">
                CREATE <i class="fa-solid fa-bolt-lightning"></i>
            </button>
        </div>

        <div class="flex-1 flex items-center justify-center relative">
            <div id="loadingOverlay" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/60 backdrop-blur-md rounded-[2rem]">
                <div class="w-20 h-20 border-4 border-purple-500/20 border-t-purple-500 rounded-full animate-spin mb-6"></div>
                <p class="text-white font-black tracking-widest text-xl animate-pulse">KI GENERIERT PIXEL...</p>
            </div>
            <div id="canvas-wrap"><canvas id="editorCanvas"></canvas></div>
        </div>
    </main>

    <script>
        // TOKEN DIREKT EINGEBAUT
        const TOKEN = "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";
        const canvas = new fabric.Canvas('editorCanvas', { preserveObjectStacking: true });
        let activeImage = null;

        function initCanvas() {
            const w = window.innerWidth - 400;
            canvas.setWidth(w);
            canvas.setHeight(w * (9/16));
            canvas.backgroundColor = '#0f172a';
            canvas.renderAll();
        }

        async function generateAI() {
            const prompt = document.getElementById('userPrompt').value;
            if(!prompt) return;

            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('genBtn').disabled = true;

            try {
                const response = await fetch("https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${TOKEN}` },
                    body: JSON.stringify({ inputs: prompt + ", high quality, 4k resolution, cinematic" }),
                });

                if (!response.ok) throw new Error("API-Limit");

                const blob = await response.blob();
                const reader = new FileReader();
                reader.onloadend = () => {
                    fabric.Image.fromURL(reader.result, (img) => {
                        img.scaleToWidth(canvas.width);
                        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                        activeImage = img;
                        document.getElementById('loadingOverlay').classList.add('hidden');
                        document.getElementById('genBtn').disabled = false;
                    }, { crossOrigin: 'anonymous' });
                };
                reader.readAsDataURL(blob);

            } catch (e) {
                alert("Die KI ist gerade beschäftigt. Bitte in 10 Sekunden nochmal versuchen.");
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('genBtn').disabled = false;
            }
        }

        function addText() {
            const text = new fabric.IText('DEIN TITEL', {
                left: 100, top: 100, fill: '#ffffff', fontSize: 60, fontFamily: 'Arial Black',
                fontWeight: '900', shadow: 'rgba(0,0,0,0.8) 4px 4px 10px'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        function flipImage() {
            const bg = canvas.backgroundImage;
            if(bg) { bg.set('flipX', !bg.flipX); canvas.renderAll(); }
        }

        function updateFilter(type, val) {
            const bg = canvas.backgroundImage;
            if(!bg) return;
            
            let f;
            if(type === 'brightness') f = new fabric.Image.filters.Brightness({ brightness: parseFloat(val) });
            if(type === 'contrast') f = new fabric.Image.filters.Contrast({ contrast: parseFloat(val) });
            if(type === 'saturation') f = new fabric.Image.filters.Saturation({ saturation: parseFloat(val) });

            // Filter anwenden oder ersetzen
            const idx = bg.filters.findIndex(i => i.type.toLowerCase() === type);
            if(idx > -1) bg.filters[idx] = f; else bg.filters.push(f);
            
            bg.applyFilters();
            canvas.renderAll();
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'WallForge-Export.png';
            link.href = canvas.toDataURL({ format: 'png', multiplier: 3 });
            link.click();
        }

        window.onresize = initCanvas;
        initCanvas();
    </script>
</body>
</html>
