<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WallForge Pro | AI Creative Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; color: #eee; font-family: sans-serif; height: 100vh; overflow: hidden; }
        .glass-panel { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .tool-btn { @apply p-3 rounded-lg hover:bg-purple-600/20 transition-all flex flex-col items-center gap-1 text-[10px] uppercase font-bold text-gray-400 hover:text-white; }
        input[type="range"] { @apply w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-purple-500; }
        #canvas-container { box-shadow: 0 0 100px rgba(0,0,0,0.5); border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body class="flex">

    <aside class="w-24 glass-panel flex flex-col items-center py-6 gap-6 z-20">
        <div class="text-purple-500 text-2xl mb-4"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
        <button onclick="addText()" class="tool-btn"><i class="fa-solid fa-font text-lg"></i>Text</button>
        <button onclick="flipX()" class="tool-btn"><i class="fa-solid fa-arrows-left-right text-lg"></i>Spiegeln</button>
        <button onclick="toggleVignette()" class="tool-btn"><i class="fa-solid fa-border-none text-lg"></i>Vignette</button>
        <div class="h-px w-8 bg-white/10 my-2"></div>
        <button onclick="canvas.clear(); setupCanvas();" class="tool-btn text-red-500 hover:text-red-400"><i class="fa-solid fa-trash-can text-lg"></i>Reset</button>
    </aside>

    <main class="flex-1 flex flex-col p-6 relative">
        <div class="max-w-4xl w-full mx-auto glass-panel p-2 rounded-2xl flex gap-3 mb-6 items-center border-purple-500/30 border">
            <input id="mainPrompt" type="text" placeholder="Ein neonfarbener Wald bei Nacht, 8k, cineastisch..." 
                   class="flex-1 bg-transparent border-none px-4 outline-none text-white">
            <button onclick="generateWallpaper()" id="genBtn" class="bg-purple-600 hover:bg-purple-500 px-8 py-3 rounded-xl font-bold transition-all flex items-center gap-2">
                <span>GENERIEREN</span><i class="fa-solid fa-bolt"></i>
            </button>
        </div>

        <div class="flex-1 flex items-center justify-center relative">
            <div id="loader" class="hidden absolute z-50 flex flex-col items-center glass-panel p-8 rounded-full">
                <div class="w-12 h-12 border-4 border-purple-500/20 border-t-purple-500 rounded-full animate-spin"></div>
            </div>
            <div id="canvas-container">
                <canvas id="mainCanvas"></canvas>
            </div>
        </div>
    </main>

    <aside class="w-72 glass-panel p-6 flex flex-col gap-8 z-20">
        <div>
            <h3 class="text-xs font-bold text-purple-400 uppercase tracking-widest mb-6">Bild-Optimierung</h3>
            <div class="space-y-6">
                <div>
                    <div class="flex justify-between text-[10px] mb-2"><span>HELLIGKEIT</span><span id="v-bright">0</span></div>
                    <input type="range" min="-1" max="1" step="0.1" value="0" oninput="applyFilter('Brightness', this.value)">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] mb-2"><span>KONTRAST</span><span id="v-contrast">0</span></div>
                    <input type="range" min="-1" max="1" step="0.1" value="0" oninput="applyFilter('Contrast', this.value)">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] mb-2"><span>SÄTTIGUNG</span><span id="v-saturate">0</span></div>
                    <input type="range" min="-1" max="1" step="0.1" value="0" oninput="applyFilter('Saturation', this.value)">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] mb-2"><span>UNSCHÄRFE</span><span id="v-blur">0</span></div>
                    <input type="range" min="0" max="1" step="0.1" value="0" oninput="applyFilter('Blur', this.value)">
                </div>
            </div>
        </div>

        <div class="mt-auto">
            <button onclick="downloadImage()" class="w-full bg-white text-black font-black py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-200 transition-all">
                <i class="fa-solid fa-download"></i> EXPORT 4K
            </button>
        </div>
    </aside>

    <script>
        const HF_TOKEN = "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";
        const canvas = new fabric.Canvas('mainCanvas');
        let currentImg = null;

        function setupCanvas() {
            const container = document.getElementById('canvas-container');
            const w = window.innerWidth - 450;
            canvas.setWidth(w);
            canvas.setHeight(w * (9/16));
            canvas.backgroundColor = '#111';
            canvas.renderAll();
        }

        async function generateWallpaper() {
            const prompt = document.getElementById('mainPrompt').value;
            if(!prompt) return;
            
            toggleLoader(true);
            try {
                const response = await fetch("https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: prompt + ", wallpaper, high resolution, masterpiece" })
                });

                const blob = await response.blob();
                const reader = new FileReader();
                reader.onloadend = () => {
                    fabric.Image.fromURL(reader.result, (img) => {
                        currentImg = img;
                        img.scaleToWidth(canvas.width);
                        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
                        toggleLoader(false);
                    });
                };
                reader.readAsDataURL(blob);
            } catch (e) {
                alert("Server ausgelastet. Bitte in 5 Sekunden nochmal probieren.");
                toggleLoader(false);
            }
        }

        function applyFilter(type, value) {
            if(!currentImg) return;
            const bg = canvas.backgroundImage;
            
            let filter;
            if(type === 'Brightness') filter = new fabric.Image.filters.Brightness({ brightness: parseFloat(value) });
            if(type === 'Contrast') filter = new fabric.Image.filters.Contrast({ contrast: parseFloat(value) });
            if(type === 'Saturation') filter = new fabric.Image.filters.Saturation({ saturation: parseFloat(value) });
            if(type === 'Blur') filter = new fabric.Image.filters.Blur({ blur: parseFloat(value) });

            const index = bg.filters.findIndex(f => f.type === type);
            if(index > -1) bg.filters[index] = filter;
            else bg.filters.push(filter);

            bg.applyFilters();
            canvas.renderAll();
            document.getElementById('v-' + type.toLowerCase()).innerText = value;
        }

        function addText() {
            const text = new fabric.IText('DEIN TEXT', {
                left: 100, top: 100, fill: '#ffffff', fontSize: 50, fontFamily: 'Arial Black',
                shadow: '2px 2px 10px rgba(0,0,0,0.5)'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        function flipX() {
            if(canvas.backgroundImage) {
                canvas.backgroundImage.set('flipX', !canvas.backgroundImage.flipX);
                canvas.renderAll();
            }
        }

        function toggleLoader(show) {
            document.getElementById('loader').classList.toggle('hidden', !show);
            document.getElementById('genBtn').disabled = show;
        }

        function downloadImage() {
            const data = canvas.toDataURL({ format: 'png', multiplier: 3 });
            const link = document.createElement('a');
            link.download = 'WallForge-Masterpiece.png';
            link.href = data;
            link.click();
        }

        window.onresize = setupCanvas;
        setupCanvas();
    </script>
</body>
</html>
